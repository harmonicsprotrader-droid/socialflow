<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialFlow — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .login-logo-icon { font-size: 28px; }
    .login-logo-name { font-size: 22px; font-weight: 700; color: #111827; }
    .login-title { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 20px; text-align: center; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    label { font-size: 12px; font-weight: 600; color: #6b7280; }
    input {
      background: #f4f5f7;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; background: #fff; }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .error {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <span class="login-logo-icon">📡</span>
      <span class="login-logo-name">SocialFlow</span>
    </div>
    <div class="login-title">Sign in to your account</div>
    <div class="error" id="error">Invalid username or password</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn-login" onclick="login()">Sign In</button>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
